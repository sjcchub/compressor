<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShrinkIt Pro | Compressor</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <style>
        :root {
            --sidebar-bg: #ffffff;
            --preview-bg: #0d121f;
            --primary: #121a2b;
            --accent: #818cf8;
            --text-main: #121a2b;
            --text-dim: #6e717d;
            --border: #d8dbe1;
            --remove-bg: #ffedea;
            --remove-text: #d61211;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--preview-bg);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- SIDEBAR CONTROLS --- */
        .sidebar {
            width: 320px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            z-index: 10;
        }

        .header h1 { font-size: 1.5rem; color: var(--primary); font-weight: 700; }
        .header p { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 24px; }

        .upload-btn {
            width: 100%;
            padding: 12px;
            border: 2px dashed var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--text-main);
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 16px;
        }

        .file-item {
            background: #f7f8f9;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .file-info { font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .remove-btn {
            background: var(--remove-bg);
            color: var(--remove-text);
            border: none;
            width: 20px; height: 20px;
            border-radius: 4px;
            cursor: pointer;
            line-height: 1;
        }

        /* Quality Slider Style */
        .slider-box { margin-bottom: 24px; }
        .slider-label { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }

        .stats { margin-bottom: 24px; }
        .stat-line { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 4px; }
        .stat-val { font-weight: 700; color: var(--accent); }

        .action-area { margin-top: auto; }
        .download-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        /* --- MAIN PREVIEW AREA --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            overflow-y: auto;
        }

        .preview-window {
            background: white;
            padding: 15px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 100%;
            max-height: 80vh;
            display: none;
        }

        .preview-window img { max-width: 100%; max-height: 70vh; display: block; }
        .empty-state { color: var(--text-dim); }

        /* --- MOBILE RESPONSIVE --- */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); height: auto; }
            .main-content { padding: 20px; height: 400px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="header">
            <h1>ShrinkIt Pro</h1>
            <p>Optimize images & PDFs</p>
        </div>

        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">+ Add File</button>
        <input type="file" id="fileInput" hidden accept="image/jpeg,image/png,application/pdf">

        <div id="fileList">
            <!-- File item appears here -->
        </div>

        <div class="slider-box">
            <div class="slider-label">
                <span>Quality</span>
                <span id="qualityPercent">70%</span>
            </div>
            <input type="range" id="qualitySlider" min="0.1" max="1.0" step="0.05" value="0.7">
        </div>

        <div class="stats">
            <div class="stat-line">
                <span>Original:</span>
                <span id="origSize">0 KB</span>
            </div>
            <div class="stat-line">
                <span>Result:</span>
                <span id="resSize" class="stat-val">0 KB</span>
            </div>
        </div>

        <div class="action-area">
            <button class="download-btn" id="downloadBtn">Compress & Download</button>
        </div>
    </div>

    <div class="main-content">
        <p id="emptyMsg" class="empty-state">No file selected for preview</p>
        <div id="previewWindow" class="preview-window">
            <img id="livePreview" src="" alt="Preview">
        </div>
    </div>

    <canvas id="compCanvas" style="display:none;"></canvas>

    <script>
        const fileInput = document.getElementById('fileInput');
        const qualitySlider = document.getElementById('qualitySlider');
        const qualityPercent = document.getElementById('qualityPercent');
        const fileList = document.getElementById('fileList');
        const origSize = document.getElementById('origSize');
        const resSize = document.getElementById('resSize');
        const livePreview = document.getElementById('livePreview');
        const previewWindow = document.getElementById('previewWindow');
        const emptyMsg = document.getElementById('emptyMsg');
        const canvas = document.getElementById('compCanvas');
        const ctx = canvas.getContext('2d');

        let activeFile = null;
        let originalImg = null;

        function formatBytes(bytes) {
            if (bytes === 0) return '0 KB';
            return (bytes / 1024).toFixed(2) + ' KB';
        }

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            activeFile = file;
            
            // UI Update
            fileList.innerHTML = `
                <div class="file-item">
                    <span class="file-info">${file.name}</span>
                    <button class="remove-btn" onclick="removeFile()">×</button>
                </div>
            `;
            origSize.innerText = formatBytes(file.size);
            emptyMsg.style.display = 'none';
            previewWindow.style.display = 'block';

            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (re) => {
                    originalImg = new Image();
                    originalImg.src = re.target.result;
                    originalImg.onload = updateCompression;
                };
                reader.readAsDataURL(file);
            } else {
                livePreview.src = ""; // No preview for PDF
                previewWindow.style.display = 'none';
                emptyMsg.innerText = "PDF Preview not available, but ready to optimize.";
                emptyMsg.style.display = 'block';
                updateCompression();
            }
        };

        function removeFile() {
            activeFile = null;
            originalImg = null;
            fileList.innerHTML = '';
            origSize.innerText = '0 KB';
            resSize.innerText = '0 KB';
            previewWindow.style.display = 'none';
            emptyMsg.style.display = 'block';
            emptyMsg.innerText = "No file selected for preview";
        }

        function updateCompression() {
            if (!activeFile) return;
            const quality = parseFloat(qualitySlider.value);
            qualityPercent.innerText = Math.round(quality * 100) + '%';

            if (activeFile.type.startsWith('image/')) {
                canvas.width = originalImg.width;
                canvas.height = originalImg.height;
                ctx.drawImage(originalImg, 0, 0);
                canvas.toBlob((blob) => {
                    livePreview.src = URL.createObjectURL(blob);
                    resSize.innerText = formatBytes(blob.size);
                }, 'image/jpeg', quality);
            } else {
                // PDF Heuristic
                const ratio = 0.85 + (quality * 0.1);
                resSize.innerText = formatBytes(activeFile.size * ratio) + " (Est.)";
            }
        }

        qualitySlider.oninput = updateCompression;

        document.getElementById('downloadBtn').onclick = async () => {
            if (!activeFile) return alert("Select a file first");
            
            if (activeFile.type.startsWith('image/')) {
                const link = document.createElement('a');
                link.href = livePreview.src;
                link.download = `compressed_${activeFile.name}`;
                link.click();
            } else {
                // PDF processing using pdf-lib
                const arrayBuffer = await activeFile.arrayBuffer();
                const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                const pdfBytes = await pdfDoc.save({ useObjectStreams: true });
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `optimized_${activeFile.name}`;
                link.click();
            }
        };
    </script>
</body>
</html>
