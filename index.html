<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Gen Pro | Images to Document</title>
    
    <!-- Dependencies for PDF creation and reordering via CDN -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <style>
        /* --- CSS Reset & Base Styling --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        body {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #212121;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- Global Colors & Variables --- */
        :root {
            --sidebar-bg: #FFFFFF;
            --preview-bg: #0D121F;
            --primary-action: #121A2B;
            --button-text: #FFFFFF;
            --dashed-border: #D8DBE1;
            --text-dim: #6E717D;
            --remove-bg: #FFEDEA;
            --remove-text: #D61211;
            --sortable-handle-dim: rgba(0,0,0,0.4);
            --header-h: 70px;
        }

        /* --- Layout: Controls Panel --- */
        .controls-panel {
            background-color: var(--sidebar-bg);
            width: 280px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--dashed-border);
            z-index: 10;
        }
        
        .header h1 { font-size: 1.6rem; color: #121A2B; font-weight: 700; margin-bottom: 3px; }
        .header p { color: var(--text-dim); margin-bottom: 25px; }

        /* --- File List (Sortable) --- */
        .file-list-container {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        .file-item {
            background-color: #f7f8f9;
            border-radius: 10px;
            padding: 8px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: grab;
            margin-bottom: 10px;
            user-select: none;
        }
        .sortable-handle {
            color: var(--sortable-handle-dim);
            cursor: move;
            font-size: 1.2rem;
            line-height: 1;
        }
        .filename-bubble {
            margin: 0 10px;
            flex-grow: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .remove-file {
            width: 18px; height: 18px;
            background-color: var(--remove-bg);
            color: var(--remove-text);
            border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.1s;
        }
        .remove-file:hover { opacity: 0.7; }

        /* --- File Actions --- */
        .add-images-btn {
            background-color: transparent;
            color: #121A2B;
            border: 2px dashed var(--dashed-border);
            border-radius: 10px;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .add-images-btn:hover { border-color: #121A2B; }

        .document-actions { margin-top: auto; }
        .action-link {
            text-align: center;
            margin-top: 10px;
            display: block;
            color: var(--text-dim);
            text-decoration: underline;
            cursor: pointer;
        }

        /* --- Download Button --- */
        .primary-btn {
            background-color: var(--primary-action);
            color: var(--button-text);
            border: none;
            border-radius: 10px;
            padding: 14px;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
        }

        /* --- Layout: Preview Panel --- */
        .preview-panel {
            background-color: var(--preview-bg);
            flex-grow: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* --- Page Previews --- */
        .pages-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .page-preview {
            background: #fff;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            user-select: none;
        }
        .page-label {
            background-color: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            cursor: move;
        }
        .preview-img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            object-fit: contain;
        }

        /* --- MOBILE ADAPTATION --- */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .controls-panel {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--dashed-border);
                height: auto;
                max-height: calc(100vh - 10px);
                position: relative;
            }
            .add-images-btn { margin-bottom: 10px; }
            .file-list-container { overflow-y: scroll; height: 150px; }
            
            .preview-panel { width: 100%; overflow-y: hidden; }
        }

        /* Hidden Input for adding files */
        #fileInput { display: none; }
        
    </style>
</head>
<body>

<div class="controls-panel">
    <div class="header">
        <h1>PDF Gen Pro</h1>
        <p>Convert & organize images to PDF</p>
    </div>

    <!-- Add Images Button (Trigger for file input) -->
    <button class="add-images-btn" onclick="document.getElementById('fileInput').click()">
        + Add Images
    </button>
    
    <!-- Hidden File Input -->
    <input type="file" id="fileInput" multiple accept="image/png, image/jpeg">

    <!-- Sortable File List -->
    <div class="file-list-container" id="fileList">
        <!-- Dynamic content: file-item bubbles -->
    </div>

    <div class="document-actions">
        <button class="primary-btn" id="downloadPDFBtn">Download PDF</button>
        <a class="action-link" id="clearAllBtn">Clear all images</a>
    </div>
</div>

<div class="preview-panel">
    <div class="pages-container" id="pagesPreview">
        <!-- Dynamic content: page-preview elements -->
    </div>
</div>

<script>
    // --- JavaScript Logic ---
    let imagesData = []; // Caches processed images: [{ id: , file: , dataUrl: , dimensions: {}}]
    let nextId = 0;

    // --- DOM Elements ---
    const fileListDOM = document.getElementById('fileList');
    const pagesPreviewDOM = document.getElementById('pagesPreview');
    const fileInputDOM = document.getElementById('fileInput');

    // --- Core Logic: Add Images ---
    fileInputDOM.addEventListener('change', (event) => {
        const files = Array.from(event.target.files);
        if (files.length === 0) return;

        addImages(files);
        fileInputDOM.value = ''; // Reset input to allow adding same file again
    });

    function addImages(files) {
        files.forEach(file => {
            if (!['image/jpeg', 'image/png'].includes(file.type)) return;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const dataUrl = event.target.result;
                const id = nextId++;

                imagesData.push({ id, file, dataUrl, dimensions: {} });
                
                renderFileListItem(id, file.name);
                renderPagePreview(id, dataUrl);
            };
        });
    }

    // --- Reordering: Sortable.js Setup ---
    new Sortable(fileListDOM, {
        handle: '.sortable-handle',
        animation: 150,
        ghostClass: 'sortable-ghost',
        onEnd: () => {
            updatePreviewOrder();
        }
    });

    function updatePreviewOrder() {
        const sortedIds = Array.from(fileListDOM.children).map(item => parseInt(item.dataset.id));
        
        // Reorder imagesData based on DOM order
        imagesData.sort((a, b) => sortedIds.indexOf(a.id) - sortedIds.indexOf(b.id));

        // Re-render pages in the correct order
        pagesPreviewDOM.innerHTML = '';
        imagesData.forEach(img => {
            renderPagePreview(img.id, img.dataUrl);
        });
    }

    // --- Rendering Helpers ---
    function renderFileListItem(id, filename) {
        const item = document.createElement('div');
        item.className = 'file-item';
        item.dataset.id = id;
        item.innerHTML = `
            <span class="sortable-handle">:::</span>
            <div class="filename-bubble">${filename}</div>
            <div class="remove-file" onclick="removeImage(${id})">×</div>
        `;
        fileListDOM.appendChild(item);
    }

    function renderPagePreview(id, dataUrl) {
        const pageCount = pagesPreviewDOM.children.length + 1;
        const preview = document.createElement('div');
        preview.className = 'page-preview';
        preview.dataset.id = id;
        preview.innerHTML = `
            <div class="page-header">
                <div class="page-label">
                    <span class="sortable-handle" style="color: rgba(255,255,255,0.7); margin-right: 5px;">:::</span>
                    PAGE ${pageCount}
                </div>
            </div>
            <img src="${dataUrl}" class="preview-img">
        `;
        pagesPreviewDOM.appendChild(preview);
    }

    // --- Document Actions ---
    document.getElementById('clearAllBtn').addEventListener('click', () => {
        imagesData = [];
        fileListDOM.innerHTML = '';
        pagesPreviewDOM.innerHTML = '';
    });

    function removeImage(id) {
        imagesData = imagesData.filter(img => img.id !== id);
        
        // Remove from list
        const listItem = fileListDOM.querySelector(`[data-id="${id}"]`);
        if (listItem) listItem.remove();
        
        updatePreviewOrder(); // Re-render pages
    }

    // --- PDF Generation & Download ---
    document.getElementById('downloadPDFBtn').addEventListener('click', generateAndDownloadPDF);

    async function generateAndDownloadPDF() {
        if (imagesData.length === 0) {
            alert('Please add at least one image.');
            return;
        }

        const { PDFDocument } = PDFLib;
        const pdfDoc = await PDFDocument.create();

        for (const img of imagesData) {
            let embeddedImage;
            if (img.file.type === 'image/jpeg') {
                embeddedImage = await pdfDoc.embedJpg(img.dataUrl);
            } else if (img.file.type === 'image/png') {
                embeddedImage = await pdfDoc.embedPng(img.dataUrl);
            } else {
                continue;
            }

            // Fit image to A4 dimensions (210 x 297 mm) with some margin
            const a4Width = 595.28; // Standard A4 points width
            const a4Height = 841.89; // Standard A4 points height
            const margin = 20;

            const maxWidth = a4Width - (2 * margin);
            const maxHeight = a4Height - (2 * margin);
            
            const scale = Math.min(maxWidth / embeddedImage.width, maxHeight / embeddedImage.height);
            const scaledDims = embeddedImage.scale(scale);

            const page = pdfDoc.addPage([a4Width, a4Height]);
            page.drawImage(embeddedImage, {
                x: (a4Width - scaledDims.width) / 2,
                y: (a4Height - scaledDims.height) / 2,
                width: scaledDims.width,
                height: scaledDims.height,
            });
        }

        const pdfBytes = await pdfDoc.save();
        download(pdfBytes, "PDFGenPro.pdf");
    }

    function download(data, filename) {
        const blob = new Blob([data], { type: 'application/pdf' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        link.click();
    }
</script>

</body>
</html>
